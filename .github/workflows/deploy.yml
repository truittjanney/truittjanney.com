name: Deploy Website

on:
    push:
        branches:
        - main
        - dev

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v2
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: us-east-2

            - name: Set environment variables
              run: |
                if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
                  echo "BUCKET=truittjanney-website-prod" >> $GITHUB_ENV
                  echo "DISTRIBUTION_ID=E3UZNF6QBUZVDO" >> $GITHUB_ENV
                else
                  echo "BUCKET=truittjanney-website-dev" >> $GITHUB_ENV
                  echo "DISTRIBUTION_ID=E3NZ0FIEE9942Z" >> $GITHUB_ENV
                fi

            - name: Sync dist directory to S3
              run: |
                aws s3 sync ./dist s3://$BUCKET --delete

            - name: Invalidate CloudFront cache
              run: |
                aws cloudfront create-invalidation \
                --distribution-id $DISTRIBUTION_ID \
                --paths "/*"
